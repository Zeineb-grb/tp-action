name: CI/CD Pipeline SpringBoot Angular MySQL

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build image Backend
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app ./springboot/app

      # 4️⃣ Build image Frontend
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app ./angular-app

      # 5️⃣ Push Backend
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app

      # 6️⃣ Push Frontend
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app

      # 7️⃣ Lancer Docker Compose (test)
      - name: Run Docker Compose
        run: |
          docker-compose up -d

      # 8️⃣ Vérifier conteneurs
      - name: Check running containers
        run: docker ps





















































