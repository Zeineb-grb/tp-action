name: CI/CD SpringBoot Angular MySQL

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build image Backend
      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./springboot/app

      # 4️⃣ Build image Frontend
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./angular-app

      # 5️⃣ Push Backend
      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      # 6️⃣ Push Frontend
      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      # 7️⃣ Test avec Docker Compose
      - name: Run Docker Compose
        run: |
          docker compose up -d

      # 8️⃣ Vérifier conteneurs
      - name: Check running containers
        run: docker ps
