- main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Spring Boot app
        run: |
          cd springboot/app
          mvn clean package -DskipTests


      # 3️⃣ Build backend image
      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./springboot/app

      # 4️⃣ Build frontend image
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./angular-app

      # 5️⃣ Push backend image
      - name: Push backend image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      # 6️⃣ Push frontend image
      - name: Push frontend image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      # 7️⃣ Start application (optional)
      - name: Start application with Docker Compose
        run: |
          docker compose up -d

























